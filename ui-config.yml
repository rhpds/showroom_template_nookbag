---
# ui-config.yml — Showroom UI Configuration
# Tab url must match the send-to-* role used in .adoc code blocks.
# OCP nginx: tab urls need trailing slash e.g. /terminal/
# RHEL Traefik: no trailing slash needed.

type: showroom
default_width: 35
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:

  # ── OCP TENANT (single terminal) ──────────────────────────────────────────
  # role="send-to-wetty"
  # - name: Terminal
  #   url: /wetty
  #   type: terminal

  # ── OCP TENANT + CONSOLE ──────────────────────────────────────────────────
  # role="send-to-wetty" | ${DOMAIN} substituted from showroom-userdata CM
  # - name: Terminal
  #   url: /wetty
  #   type: terminal
  # - name: OCP Console
  #   url: 'https://console-openshift-console.${DOMAIN}'
  #   external: false

  # ── OCP DEDICATED (terminal container, no wetty) ──────────────────────────
  # AgV: terminal_type: showroom → serves at /terminal/
  # role="send-to-terminal"  |  trailing slash REQUIRED for nginx
  # - name: Terminal
  #   url: /terminal/
  #   type: terminal
  # - name: OCP Console
  #   url: '{openshift_cluster_console_url}'
  #   external: false

  # ── RHEL VM (bastion + node) ───────────────────────────────────────────────
  # vm_workload_showroom: bastion=/wetty  node=/terminal/
  # role="send-to-wetty" for bastion | role="send-to-terminal" for node
  # - name: Terminal (Bastion)
  #   url: /wetty
  #   type: terminal
  # - name: Terminal (Node)
  #   url: /terminal/
  #   type: terminal

  # ── TTYD (Tyrell's setup) ─────────────────────────────────────────────────
  # role="send-to-terminal"  |  execute-listener.js auto-injected by buttons.js
  # - name: Terminal
  #   url: /terminal/
  #   type: terminal

  # Placeholder — replace with your lab's tab config above
  - name: Example Docs
    url: 'https://docs.redhat.com'
    external: false
