---
# AgnosticV snippets — copy the relevant block into your catalog's common.yaml
# Full reference: https://github.com/rhpds/agnosticv/tree/master/tests/
#
# REQUIRED for ALL lab types:
#   ocp4_workload_showroom_wetty_image: "quay.io/rhpds/wetty:v3.0"
#   → wetty:v3.0 has native postMessage support for send-to buttons
#
# REQUIRED for E2E solve/validate:
#   ocp4_workload_showroom_runtime_automation_enable: true
#   ocp4_workload_showroom_runtime_automation_image: "quay.io/rhpds/zt-runner:v2.4.2"
#   → set in summit-2026/account.yaml for all Summit labs globally


# ── OCP TENANT (multi-user) ───────────────────────────────────────────────
# Reference: tests/zt-ocp-pipelines-tenant/common.yaml L60-65, L97-107, L153

ocp_tenant_example:
  # Showroom chart
  ocp4_workload_showroom_content_git_repo: https://github.com/YOUR-ORG/YOUR-SHOWROOM.git
  ocp4_workload_showroom_content_git_repo_ref: main
  ocp4_workload_showroom_content_antora_playbook: site.yml
  ocp4_workload_showroom_chart_package_url: https://rhpds.github.io/showroom-deployer
  ocp4_workload_showroom_deployer_chart_name: showroom-single-pod
  ocp4_workload_showroom_deployer_chart_version: "2.1.4"
  ocp4_workload_showroom_terminal_type: wetty           # enables /wetty tab
  ocp4_workload_showroom_wetty_image: "quay.io/rhpds/wetty:v3.0"
  # E2E runtime automation
  ocp4_workload_showroom_runtime_automation_enable: true
  ocp4_workload_showroom_runtime_automation_image: "quay.io/rhpds/zt-runner:v2.4.2"
  # Workloads
  # agnosticd_workloads:
  #   - agnosticd.showroom.ocp4_workload_showroom
  #   - rhpds.ftl.ocp4_workload_runtime_automation_k8s   # creates zt-runner SA
  # Optional: trigger automated solve/validate after provisioning
  # run_e2e_load_test: false


# ── OCP DEDICATED + BASTION ───────────────────────────────────────────────
# Reference: tests/zt-ocp-dedicated-grading/common.yaml L49-54, L82-92, L95-100

ocp_dedicated_example:
  ocp4_workload_showroom_content_git_repo: https://github.com/YOUR-ORG/YOUR-SHOWROOM.git
  ocp4_workload_showroom_content_git_repo_ref: main
  ocp4_workload_showroom_content_antora_playbook: site.yml
  ocp4_workload_showroom_chart_package_url: https://rhpds.github.io/showroom-deployer
  ocp4_workload_showroom_deployer_chart_name: showroom-single-pod
  ocp4_workload_showroom_deployer_chart_version: "2.1.4"
  ocp4_workload_showroom_terminal_type: showroom         # enables /terminal/ tab
  ocp4_workload_showroom_wetty_image: "quay.io/rhpds/wetty:v3.0"
  # E2E runtime automation
  ocp4_workload_showroom_runtime_automation_enable: true
  ocp4_workload_showroom_runtime_automation_image: "quay.io/rhpds/zt-runner:v2.4.2"
  # cluster-admin SA — needed to create namespaces and RoleBindings
  ocp4_workload_runtime_automation_k8s_cluster_admin: true
  ocp4_workload_runtime_automation_k8s_openshift_api_url: "{{ openshift_api_url }}"
  ocp4_workload_runtime_automation_k8s_openshift_api_token: "{{ openshift_cluster_admin_token }}"
  # Propagate bastion SSH credentials to showroom-userdata
  # (bastion_host, bastion_port, bastion_user, bastion_password injected as extravars)
  # run_e2e_load_test: false


# ── RHEL VM + BASTION ─────────────────────────────────────────────────────
# Reference: tests/zt-rhel-grading/common.yaml L143-148, L256, L264-267

rhel_vm_example:
  # vm_workload_showroom settings
  showroom_content_git_repo: https://github.com/YOUR-ORG/YOUR-SHOWROOM.git
  showroom_content_git_repo_ref: main
  showroom_wetty_image: "quay.io/rhpds/wetty:v3.0"  # L256 — required for send-to
  # E2E runtime automation (runner as Podman on bastion)
  showroom_ansible_runner_api: true
  showroom_ansible_runner_image: quay.io/rhpds/zt-runner
  showroom_ansible_runner_image_tag: v2.4.2
  showroom_ansible_runner_path: "/stream"
  # Workloads
  # agnosticd_workloads:
  #   - agnosticd.showroom.vm_workload_showroom
  #   - rhpds.ftl.vm_workload_runtime_automation
  # run_e2e_load_test: false
