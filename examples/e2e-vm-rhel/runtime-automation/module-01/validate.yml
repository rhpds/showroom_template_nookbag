---
# VALIDATE — RHEL VM + Bastion, Module 1
# Collect results from node using hostvars, then call validation_check from bastion.
# Only one validation_check per playbook — always in the last play.

- name: Build inventory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.add_host:
        name: node
        ansible_user: lab-user
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-F /app/.ssh/config"

    - ansible.builtin.add_host:
        name: bastion
        ansible_user: lab-user
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-F /app/.ssh/config"

- name: Check node tasks
  hosts: node
  gather_facts: false
  tasks:
    - name: Check project directory
      ansible.builtin.stat:
        path: /home/lab-user/myproject
      register: r_dir

    - name: Check README
      ansible.builtin.stat:
        path: /home/lab-user/myproject/README.md
      register: r_readme

- name: Check bastion tasks and validate
  hosts: bastion
  gather_facts: false
  tasks:
    - name: Check notes file on bastion
      ansible.builtin.stat:
        path: /home/lab-user/lab-notes.txt
      register: r_notes

    - name: Build results
      ansible.builtin.set_fact:
        _task1_ok: "{{ hostvars['node']['r_dir'].stat.exists and hostvars['node']['r_dir'].stat.isdir }}"
        _task2_ok: "{{ hostvars['node']['r_readme'].stat.exists }}"
        _task3_ok: "{{ r_notes.stat.exists }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok and _task3_ok }}"
        pass_msg: |
          ✅ Task 1: /home/lab-user/myproject exists on node
          ✅ Task 2: README.md exists in myproject on node
          ✅ Task 3: lab-notes.txt exists on bastion
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Task 1: /home/lab-user/myproject on node
          {{ '✅' if _task2_ok else '❌' }} Task 2: README.md on node
          {{ '✅' if _task3_ok else '❌' }} Task 3: lab-notes.txt on bastion

          Fix:
            ssh node "mkdir -p /home/lab-user/myproject"
            ssh node "echo '# My Project' > /home/lab-user/myproject/README.md"
            touch /home/lab-user/lab-notes.txt
