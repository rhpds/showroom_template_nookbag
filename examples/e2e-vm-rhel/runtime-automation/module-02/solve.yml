---
# SOLVE — RHEL VM + Bastion, Module 2
# Install a package on the RHEL node via SSH

- name: Build inventory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - ansible.builtin.add_host:
        name: node
        ansible_user: lab-user
        ansible_ssh_private_key_file: /app/.ssh/id_rsa
        ansible_ssh_common_args: "-F /app/.ssh/config"

- name: Install package on node
  hosts: node
  gather_facts: false
  become: true
  tasks:
    - name: Install httpd
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Enable and start httpd
      ansible.builtin.systemd:
        name: httpd
        state: started
        enabled: true
